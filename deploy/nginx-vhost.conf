# Vhost Nginx pour le portfolio
# A poser sur le VPS : /etc/nginx/sites-available/arnold-convolbo.duckdns.org
# Puis activer :
#   sudo ln -s /etc/nginx/sites-available/arnold-convolbo.duckdns.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS : sudo certbot --nginx -d arnold-convolbo.duckdns.org

server {
    listen 80;
    listen [::]:80;

    server_name arnold-convolbo.duckdns.org;

    # Logs dédiés
    access_log /var/log/nginx/portfolio.access.log;
    error_log  /var/log/nginx/portfolio.error.log;

    # Taille max pour uploads éventuels
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Healthcheck direct vers le conteneur
    location = /healthz {
        proxy_pass http://127.0.0.1:3006/healthz;
        access_log off;
    }
}
